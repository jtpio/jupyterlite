version: 2
build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
    nodejs: "24"
  jobs:
    post_checkout:
      - git fetch --unshallow || true
    post_install:
      - python -m pip install --upgrade pip
      - python -m pip install --group docs --group dev --group demo
      - python -m pip install -e './py/jupyterlite-core[all]' -e ./py/jupyterlite
      - corepack enable
      - jlpm install
      - jlpm build
      - jlpm docs
      - jupyter lite build --contents examples --output-dir build/docs-app
sphinx:
  builder: html
  configuration: docs/conf.py
  fail_on_warning: true
