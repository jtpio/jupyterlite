name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'

env:
  CACHE_EPOCH: 4

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILDING_IN_CI: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build dist
        uses: ./.github/actions/build-dist

      - name: Upload (dist)
        uses: actions/upload-artifact@v5
        with:
          name: jupyterlite dist ${{ github.run_number }}
          path: ./dist

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: jupyterlab/maintainer-tools/.github/actions/base-setup@v1
      - name: Cache (pip)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: |
            ${{ env.CACHE_EPOCH }}-${{ runner.os }}-pip-lint-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ env.CACHE_EPOCH }}-${{ runner.os }}-pip-lint-
            ${{ env.CACHE_EPOCH }}-${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --group lint --group dev
          jlpm
      - name: Lint
        run: jlpm lint:check

  integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: jupyterlab/maintainer-tools/.github/actions/base-setup@v1
      - name: Install dependencies
        run: jlpm
      - name: Repo Integrity
        shell: bash -el {0}
        run: |
          jlpm deduplicate
          git diff --exit-code yarn.lock

  typedoc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: jupyterlab/maintainer-tools/.github/actions/base-setup@v1
      - name: Install dependencies
        run: |
          python -m pip install --group dev
          jlpm
      - name: Build lib
        run: jlpm build:lib
      - name: Docs (typedoc)
        run: jlpm docs
      - name: Upload (typedoc)
        uses: actions/upload-artifact@v5
        with:
          name: jupyterlite typedoc ${{ github.run_number }}
          path: ./docs/reference/api/ts

  test:
    needs: [build]
    runs-on: ${{ matrix.os }}-latest
    env:
      TESTING_IN_CI: 1
      PYTEST_ARGS: ${{ matrix.pytest-args }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, windows, macos]
        python-version: ['3.10', '3.14', 'pypy-3.10']
        include:
          # OS-specifics for running pip
          - os: ubuntu
            pip-cache: ~/.cache/pip
            python-command: python3
          - os: macos
            pip-cache: ~/Library/Caches/pip
            python-command: python3
          - os: windows
            pip-cache: ~\AppData\Local\pip\Cache
            python-command: python
          # python-specifics for tests
          - python-version: '3.10'
            pytest-args: '[]'
          - python-version: '3.14'
            pytest-args: '[]'
          - python-version: 'pypy-3.10'
            # TODO: some instability with libarchive, might be better with pypy-3.8
            # after https://github.com/cloudpipe/cloudpickle/pull/461
            pytest-args: '["-k", "not _archive_is_"]'
        exclude:
          - os: windows
            python-version: pypy-3.10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Setup pip (base)
        run: ${{ matrix.python-command }} -m pip install --user -U pip setuptools wheel
      - name: Download (dist)
        uses: actions/download-artifact@v6
        with:
          name: jupyterlite dist ${{ github.run_number }}
          path: ./dist
      - name: Cache (pip)
        uses: actions/cache@v4
        with:
          path: ${{ matrix.pip-cache }}
          key: |
            ${{ env.CACHE_EPOCH }}-${{ runner.os }}-pip-test-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ env.CACHE_EPOCH }}-${{ runner.os }}-pip-test-${{ matrix.python-version }}-
            ${{ env.CACHE_EPOCH }}-${{ runner.os }}-pip-test-
            ${{ env.CACHE_EPOCH }}-${{ runner.os }}-pip-
      - name: Install (py)
        run: |
          ${{ matrix.python-command }} -m pip install jupyter_core pycparser
          ${{ matrix.python-command }} -m pip install --find-links dist --no-index jupyterlite_core
          ${{ matrix.python-command }} -m pip check
      - name: Prepare smoke test folder
        shell: bash
        run: mkdir -p build/smoke-test
      - name: Get SOURCE_DATE_EPOCH
        id: source-date
        shell: bash -eux {0}
        run: |
          echo "epoch=$(git log -1 --format=%ct)" >> $GITHUB_OUTPUT
      - name: Test (CLI)
        run: |
          cd build/smoke-test
          jupyter lite --version || exit 1
          jupyter lite --help || exit 1
          jupyter lite list || exit 1
          jupyter lite status || exit 1
          jupyter lite build || exit 1
          jupyter lite check || exit 1
          jupyter lite archive --source-date-epoch ${{ steps.source-date.outputs.epoch }} || exit 1
          jupyter lite list || exit 1
          jupyter lite status --debug || exit 1
      - name: Setup pip (test)
        run: |
          ${{ matrix.python-command }} -m pip install --group test
      - name: Pin pytest for pypy
        if: ${{ matrix.python-version == 'pypy-3.10' }}
        run: |
          ${{ matrix.python-command }} -m pip install "pytest<8" --prefer-binary
          echo 'See https://github.com/jupyterlite/jupyterlite/issues/1308' >> $GITHUB_STEP_SUMMARY
      - name: Test (py)
        run: |
          ${{ matrix.python-command }} -m pytest py/jupyterlite-core/tests -v --cov=jupyterlite_core --cov-report=html:build/htmlcov --cov-report=term-missing --cov-fail-under=82
      - name: Upload (reports)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: |
            jupyterlite reports ${{ github.run_number }} ${{ matrix.os }} ${{ matrix.python-version }}
          path: |
            build/htmlcov
            build/pytest

  docs:
    needs: [build, typedoc]
    runs-on: ubuntu-latest
    env:
      DOCS_IN_CI: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download (dist)
        uses: actions/download-artifact@v6
        with:
          name: jupyterlite dist ${{ github.run_number }}
          path: ./dist
      - name: Download (typedoc)
        uses: actions/download-artifact@v6
        with:
          name: jupyterlite typedoc ${{ github.run_number }}
          path: ./docs/reference/api/ts
      - uses: jupyterlab/maintainer-tools/.github/actions/base-setup@v1
      - name: Cache (pip)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: |
            ${{ env.CACHE_EPOCH }}-${{ runner.os }}-pip-docs-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ env.CACHE_EPOCH }}-${{ runner.os }}-pip-docs-
            ${{ env.CACHE_EPOCH }}-${{ runner.os }}-pip-
      - name: Setup pip (docs)
        run: |
          python3 -m pip install --group docs --group dev --group demo
      - name: Install (py)
        run: pip install -e './py/jupyterlite-core[all,test]'
      - name: Install dependencies
        run: jlpm
      - name: Docs (app)
        run: jupyter lite build --contents examples --output-dir build/docs-app
      - name: Docs (app archive)
        run: |
          cd build/docs-app
          tar -czvf ../jupyterlite-docs-app.tgz .
      - name: Upload (docs app archive)
        uses: actions/upload-artifact@v5
        with:
          name: jupyterlite docs archive ${{ github.run_number }}
          path: |
            build/jupyterlite-docs-app.tgz
      - name: Docs (sphinx)
        run: jlpm docs:build
      - name: Check Built Artifacts
        run: python -m pytest --check-links docs/_build/html --check-links-ignore "https://github.com/.*" --check-links-ignore "https://pypi.org/.*" -q
      - name: Test (py)
        run: |
          python -m pytest py/jupyterlite-core/tests -v --cov=jupyterlite_core --cov-report=html:build/htmlcov --cov-report=term-missing --cov-fail-under=82
      - name: Upload (reports)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: |
            jupyterlite reports ${{ github.run_number }} docs
          path: |
            build/htmlcov
            build/pytest
      - name: Upload (sphinx logs)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: jupyterlite sphinx logs ${{ github.run_number }}
          if-no-files-found: ignore
          path: /tmp/sphinx-*.log
